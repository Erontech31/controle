<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploração Interativa 3D do Sistema Solar</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        /* Variáveis e Configurações Globais */
        :root {
            --bg-dark: #02050a;
            --text-light: #e0e6ed;
            --neon-blue: #00f3ff;
            --glass-bg: rgba(10, 15, 30, 0.7);
            --glass-border: rgba(0, 243, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow: hidden;
            user-select: none;
        }

        /* Fundo Estrelado (CSS puro para telas 2D) */
        #stars-background {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at center, #051024 0%, #000000 100%);
        }

        .star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Telas e Transições */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            display: flex;
            flex-direction: column;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        /* TELA INICIAL */
        #home-screen { align-items: center; justify-content: center; z-index: 10; }

        .title {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #8da3b8;
            margin-bottom: 50px;
            text-align: center;
        }

        .cards-container { display: flex; gap: 30px; }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.3);
            border-color: var(--neon-blue);
        }

        .card h2 { color: var(--neon-blue); margin-bottom: 15px; font-size: 2rem; }

        /* BOTÃO DE VOLTAR */
        .back-btn {
            position: absolute;
            top: 20px; left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
            transition: background 0.3s;
        }

        .back-btn:hover { background: rgba(255, 255, 255, 0.3); }

        /* MODO EXPLORAR - SISTEMA SOLAR 3D */
        #explore-screen { background: #000; }
        #webgl-canvas { width: 100vw; height: 100vh; display: block; }
        
        #tooltip {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
            display: none;
            z-index: 50;
            font-size: 14px;
            border: 1px solid var(--neon-blue);
        }

        /* PAINEL LATERAL */
        #side-panel {
            position: absolute;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100%;
            background: rgba(5, 10, 20, 0.9);
            border-left: 2px solid var(--neon-blue);
            backdrop-filter: blur(15px);
            padding: 30px;
            transition: right 0.4s ease-out;
            z-index: 100;
            overflow-y: auto;
        }

        #side-panel:not(.hidden) { right: 0; }

        #close-panel {
            position: absolute;
            top: 15px; right: 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Container de imagem do modo explorar (Astro 1) */
        #panel-image-container {
            width: 100%; height: 150px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: flex; align-items: center; justify-content: center;
            background: #0b0f19;
            overflow: hidden;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }

        #panel-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #panel-title { color: var(--neon-blue); font-size: 2rem; margin-bottom: 10px; }
        .desc-text { font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; color: #b3c5d6; }

        .data-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }

        .data-item {
            background: rgba(255, 255, 255, 0.05); padding: 10px;
            border-radius: 6px; font-size: 0.85rem;
        }

        .data-item span { display: block; color: var(--neon-blue); font-weight: bold; margin-bottom: 3px;}

        /* CONTROLES INFERIORES */
        #bottom-controls {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 15px 30px;
            border-radius: 30px;
            display: flex; gap: 20px; align-items: center;
            backdrop-filter: blur(10px);
            z-index: 90;
        }

        button {
            background: transparent; border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 8px 15px; border-radius: 20px;
            cursor: pointer; font-size: 0.9rem; transition: all 0.2s;
        }

        button:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-blue); }
        button.active-speed { background: var(--neon-blue); color: #000; border-color: var(--neon-blue); font-weight: bold; }

        .speed-controls {
            display: flex; gap: 5px; border-left: 1px solid rgba(255,255,255,0.2);
            border-right: 1px solid rgba(255,255,255,0.2); padding: 0 20px;
        }

        /* MODO SAIBA MAIS (WIKIPÉDIA) */
        #wiki-screen { overflow-y: auto; background-color: var(--bg-dark); z-index: 10;}

        .wiki-title {
            text-align: center; margin: 40px 0; font-size: 3rem; color: var(--neon-blue);
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .wiki-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px; padding: 0 50px 50px 50px; max-width: 1400px; margin: 0 auto;
        }

        .wiki-card {
            background: rgba(15, 22, 38, 0.8); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s;
        }

        .wiki-card:hover {
            transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0, 243, 255, 0.15);
            border-color: rgba(0, 243, 255, 0.5);
        }
        
        .wiki-color-header { height: 10px; width: 100%; }
        
        /* Container de imagem do modo saiba mais (Astro 2) */
        .wiki-photo-container {
            width: 100%;
            height: 200px;
            background-color: #0b0f19;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        .wiki-photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .wiki-card:hover .wiki-photo-container img {
            transform: scale(1.05);
        }

        .wiki-content { padding: 20px; }
        .wiki-content h2 { color: var(--neon-blue); margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;}
        .wiki-content p { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 10px; line-height: 1.4;}
        .wiki-content strong { color: #fff; }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            .cards-container { flex-direction: column; }
            #bottom-controls { flex-wrap: wrap; justify-content: center; border-radius: 15px; bottom: 10px; width: 95%; padding: 10px;}
            #side-panel { width: 100%; right: -100%; }
            .speed-controls { border: none; padding: 10px 0; width: 100%; justify-content: center; }
            .wiki-grid { padding: 20px; }
        }
    </style>
</head>
<body>
    <div id="stars-background"></div>

    <section id="home-screen" class="screen active">
        <h1 class="title">Sistema Solar</h1>
        <p class="subtitle">Uma jornada 3D interativa pelo nosso cosmos</p>
        <div class="cards-container">
            <div class="card" id="btn-explore">
                <h2>Explorar 3D</h2>
                <p>Navegue pelo espaço em uma simulação 3D realista.</p>
            </div>
            <div class="card" id="btn-wiki">
                <h2>Saiba Mais</h2>
                <p>Acesse a enciclopédia completa dos astros.</p>
            </div>
        </div>
    </section>

    <section id="explore-screen" class="screen hidden">
        <button class="back-btn" onclick="showScreen('home-screen')">← Voltar</button>
        
        <canvas id="webgl-canvas"></canvas>
        <div id="tooltip">Planeta</div>

        <aside id="side-panel" class="hidden">
            <button id="close-panel" onclick="closeSidePanel()">×</button>
            <div id="panel-image-container"></div>
            <h2 id="panel-title">Nome do Astro</h2>
            <div class="panel-content">
                <p id="panel-desc" class="desc-text"></p>
                <div id="panel-data" class="data-grid"></div>
                <h3>Curiosidades</h3>
                <p id="panel-trivia"></p>
            </div>
        </aside>

        <nav id="bottom-controls">
            <button id="btn-play-pause">⏸ Pausar</button>
            <div class="speed-controls">
                <button onclick="setSpeed(0.2)">Lento</button>
                <button onclick="setSpeed(1)" class="active-speed">Normal</button>
                <button onclick="setSpeed(4)">Rápido</button>
            </div>
            <button id="btn-toggle-orbits">Ocultar Órbitas</button>
            <button id="btn-reset">Resetar Câmera</button>
        </nav>
    </section>

    <section id="wiki-screen" class="screen hidden">
        <button class="back-btn" onclick="showScreen('home-screen')">← Voltar</button>
        <h1 class="wiki-title">Enciclopédia Cósmica</h1>
        <div id="wiki-grid" class="wiki-grid"></div>
    </section>

    <script>
        // ==========================================
        // DADOS DOS CORPOS CELESTES (Planetas e Estrela)
        // ==========================================
        const celestialData = [
            { id: 'sol', name: 'Sol', type: 'Estrela', distance: 0, radius: 20, speed: 0.005, color: 0xffcc00, emissive: 0xffaa00, shortDesc: 'A estrela central do nosso sistema, uma esfera massiva de plasma que fornece luz e calor essenciais para a vida.', desc: 'O Sol é uma estrela anã amarela localizada no centro do nosso Sistema Solar, concentrando cerca de 99,86% de toda a massa do sistema. É composto majoritariamente por hidrogênio e hélio, operando como um colossal reator de fusão nuclear que transforma toneladas de matéria em pura energia a cada segundo. Essa radiação viaja pelo espaço e aquece a Terra, regulando o clima, permitindo a fotossíntese e sustentando toda a biosfera viva. Sem a sua intensa força gravitacional, todos os planetas seriam lançados ao vazio do espaço profundo.', wiki: { Tipo: 'Estrela Anã Amarela', Diâmetro: '1.392.700 km', Temperatura: '5.500 °C (superfície)', 'Composição Principal': '73% Hidrogênio, 25% Hélio', Idade: '4,6 bilhões de anos' }, trivia: 'A luz do Sol leva cerca de 8 minutos e 20 segundos para chegar à Terra.' },
            { id: 'mercurio', name: 'Mercúrio', type: 'Planeta', distance: 40, radius: 2, speed: 0.04, color: 0xa8a8a8, shortDesc: 'O menor planeta do sistema e o mais próximo do Sol, com superfícies repletas de crateras.', desc: 'Mercúrio é o planeta mais interno e o menor do Sistema Solar. Por não possuir uma atmosfera espessa para reter o calor, ele enfrenta a variação de temperatura mais radical do sistema, alternando entre um calor causticante de 427 °C durante o dia e um frio congelante de -173 °C à noite. Sua superfície é antiga e coberta por crateras de impacto, assemelhando-se à Lua terrestre, revelando um passado marcado por colisões violentas.', wiki: { 'Distância do Sol': '57.9M km', Diâmetro: '4.879 km', Temperatura: '-173°C a 427°C', 'Duração do Dia': '59 dias terrestres', 'Ano': '88 dias terrestres' }, trivia: 'Não é o planeta mais quente, apesar de ser o mais próximo do Sol.' },
            { id: 'venus', name: 'Vênus', type: 'Planeta', distance: 55, radius: 4, speed: 0.025, color: 0xe08f43, shortDesc: 'Planeta rochoso com atmosfera ácida e um efeito estufa extremo que o torna o mais quente.', desc: 'Muitas vezes apelidado de planeta gêmeo da Terra devido ao seu tamanho semelhante, Vênus é um verdadeiro inferno cosmológico. Ele é envolto por uma densa atmosfera de dióxido de carbono com nuvens permanentes de ácido sulfúrico. Essa combinação gera um efeito estufa descontrolado que aprisiona o calor solar, elevando a temperatura de sua superfície para esmagadores 462 °C — quente o suficiente para derreter chumbo. Além disso, a pressão em sua superfície é 92 vezes maior que a da Terra.', wiki: { 'Distância do Sol': '108.2M km', Diâmetro: '12.104 km', Temperatura: '462°C', 'Duração do Dia': '243 dias terrestres', 'Pressão Atmosférica': '92x a da Terra' }, trivia: 'Gira em seu próprio eixo na direção oposta à da maioria dos planetas.' },
            { id: 'terra', name: 'Terra', type: 'Planeta', distance: 75, radius: 4.5, speed: 0.015, color: 0x2b82c9, shortDesc: 'Nosso lar, o único planeta conhecido por abrigar vida e possuir água líquida abundante.', desc: 'A Terra é o terceiro planeta a partir do Sol e o único lugar conhecido no universo capaz de abrigar vida. A combinação perfeita de sua distância em relação ao Sol (zona habitável), uma atmosfera rica em nitrogênio e oxigênio, e a presença de água líquida em abundância (cobrindo 71% da superfície) cria as condições ideais para a biodiversidade. O planeta conta ainda com um campo magnético robusto que atua como um escudo protetor contra as partículas carregadas do vento solar.', wiki: { 'Distância do Sol': '149.6M km', Diâmetro: '12.742 km', Temperatura: 'Média de 15°C', Idade: '4,5 bilhões de anos', 'Água na Superfície': '71%' }, trivia: 'A atmosfera é principalmente composta de nitrogênio (78%) e oxigênio (21%).' },
            { id: 'lua', name: 'Lua', type: 'Satélite', parentId: 'terra', distance: 8, radius: 1.2, speed: 0.08, color: 0xd9d9d9, shortDesc: 'O satélite natural da Terra, responsável por estabilizar nosso eixo e criar as marés.', desc: 'A Lua é o único satélite natural da Terra e o quinto maior do Sistema Solar. Encontra-se em rotação síncrona com o nosso planeta, exibindo sempre a mesma face para nós. A força gravitacional da Lua exerce um papel vital na dinâmica terrestre: ela puxa as massas de água criando as marés oceânicas e atua como um estabilizador do eixo de inclinação da Terra, o que garante a regularidade das estações do ano e um clima previsível ao longo de eras.', wiki: { 'Distância da Terra': '384.400 km', Diâmetro: '3.474 km', Gravidade: '0,166 g (1/6 da Terra)', Temperatura: '-173°C a 127°C' }, trivia: 'Está se afastando lentamente da Terra a uma taxa de cerca de 3,8 cm por ano.' },
            { id: 'marte', name: 'Marte', type: 'Planeta', distance: 100, radius: 3, speed: 0.012, color: 0xc1440e, shortDesc: 'O Planeta Vermelho, um mundo desértico e frio rico em ferro e vulcões gigantes.', desc: 'Marte deve sua coloração vermelha característica à abundância de óxido de ferro (ferrugem) em seu solo poeirento. É um mundo desértico, extremamente frio e com uma atmosfera fina composta majoritariamente por dióxido de carbono. Apesar de sua aridez atual, evidências geológicas indicam que Marte já teve rios e lagos em seu passado distante. Ele abriga o famoso Monte Olimpo, o maior vulcão do Sistema Solar, com impressionantes 21 km de altura.', wiki: { 'Distância do Sol': '227.9M km', Diâmetro: '6.779 km', Temperatura: 'Média de -60°C', Atmosfera: '95% Dióxido de Carbono', 'Duração do Dia': '24h 37m' }, trivia: 'A sua inconfundível cor avermelhada vem literalmente do óxido de ferro (ferrugem).' },
            { id: 'jupiter', name: 'Júpiter', type: 'Planeta', distance: 150, radius: 12, speed: 0.006, color: 0xc88b3a, shortDesc: 'O maior planeta do sistema, um gigante gasoso com uma massiva tempestade secular.', desc: 'Júpiter é o verdadeiro gigante do Sistema Solar, possuindo mais que o dobro da massa de todos os outros planetas somados. Sendo um gigante gasoso composto quase totalmente de hidrogênio e hélio, ele não possui uma superfície sólida definida. Sua atmosfera externa é dividida em faixas turbulentas acionadas por ventos brutais. Sua característica mais famosa é a Grande Mancha Vermelha, uma tempestade anticiclônica maior que a própria Terra que ruge há mais de três séculos.', wiki: { 'Distância do Sol': '778.5M km', Diâmetro: '139.820 km', Luas: '95 conhecidas', 'Duração do Dia': '10 horas terrestres' }, trivia: 'Seu volume é tão absurdo que mais de 1.300 Terras caberiam facilmente dentro dele.' },
            { id: 'saturno', name: 'Saturno', type: 'Planeta', distance: 210, radius: 10, speed: 0.004, color: 0xeaddb1, hasRings: true, shortDesc: 'O segundo maior gigante gasoso, famoso por seu imenso e deslumbrante sistema de anéis.', desc: 'Saturno é um dos objetos mais deslumbrantes do céu noturno devido ao seu monumental sistema de anéis. Esses anéis são formados por bilhões de partículas que variam desde grãos de poeira até blocos de gelo do tamanho de casas, orbitando o equador do planeta. É um gigante gasoso de baixa densidade — flutuaria se colocado em uma piscina gigante de água. Ele possui uma corte complexa de mais de 140 luas, incluindo Titã, que possui uma atmosfera espessa.', wiki: { 'Distância do Sol': '1.434M km', Diâmetro: '116.460 km', Luas: '146 conhecidas', 'Duração do Dia': '10,7 horas terrestres' }, trivia: 'Sua densidade média é tão baixa que, em um oceano grande o suficiente, o planeta inteiro flutuaria.' },
            { id: 'urano', name: 'Urano', type: 'Planeta', distance: 270, radius: 7, speed: 0.0025, color: 0x4b70dd, shortDesc: 'Um gigante de gelo azul-esverdeado que se destaca por orbitar inclinado de lado.', desc: 'Urano é um gigante de gelo cuja atmosfera fria é rica em água, amônia e metano, gás responsável por sua tonalidade azul-esverdeada clara. O aspecto mais bizarro de Urano é que ele gira praticamente "deitado" em relação ao seu plano orbital, com uma inclinação de cerca de 98 graus. Cientistas acreditam que essa inclinação radical tenha sido provocada por um impacto cataclísmico com um corpo colossal no início da formação do Sistema Solar.', wiki: { 'Distância do Sol': '2.871M km', Diâmetro: '50.724 km', Temperatura: 'Média de -195°C', 'Duração do Ano': '84 anos terrestres', Tipo: 'Gigante de Gelo' }, trivia: 'Possui o eixo de rotação mais inclinado do Sistema Solar (aproximadamente 98 graus).' },
            { id: 'netuno', name: 'Netuno', type: 'Planeta', distance: 320, radius: 6.8, speed: 0.002, color: 0x274687, shortDesc: 'O planeta mais distante, um mundo azulado fustigado pelos ventos mais velozes do sistema.', desc: 'Netuno é o oitavo e último planeta oficial do Sistema Solar, situando-se nas profundezas congelantes do espaço profundo. É um gigante de gelo com uma coloração azul intensa. Trata-se de um mundo extremamente dinâmico e turbulento, castigado pelos ventos mais velozes registrados no Sistema Solar, que ultrapassam os 2.100 km/h. Possui anéis tênues e sua maior lua, Tritão, orbita o planeta em sentido retrógrado expelindo nitrogênio gasoso.', wiki: { 'Distância do Sol': '4.495M km', Diâmetro: '49.244 km', Temperatura: 'Média de -201°C', 'Duração do Ano': '165 anos terrestres', 'Ventos Máximos': 'Acima de 2.100 km/h' }, trivia: 'Foi o primeiro planeta descoberto através de previsões e cálculos matemáticos antes de ser visto por um telescópio.' }
        ];

        // ==========================================
        // INFORMAÇÕES EXTRAS EXCLUSIVAS DO "SAIBA MAIS"
        // ==========================================
        const extraWikiData = [
            { id: 'cometas', name: 'Cometas', color: 0x99ccff, desc: 'Os cometas são pequenos corpos celestes compostos majoritariamente por gelo, poeira, rochas e gases congelados que orbitam o Sol em trajetórias elípticas altamente alongadas. Quando um cometa se aproxima do Sol, o calor solar sublima seus gelos, criando uma atmosfera temporária brilhante chamada "coma" e as suas famosas caudas direcionadas para o lado oposto ao Sol devido ao vento solar.', wiki: { 'Origem Principal': 'Nuvem de Oort e Cinturão de Kuiper', 'Componentes da Cauda': 'Gás ionizado e poeira reflexiva', 'Exemplo Famoso': 'Cometa Halley (visível a cada 75-76 anos)' }, trivia: 'A cauda de um cometa pode se estender por milhões de quilômetros, mas é composta de matéria extremamente rarefeita.' },
            { id: 'asteroides', name: 'Asteroides', color: 0x888888, desc: 'Asteroides são corpos rochosos e metálicos, sem atmosfera, que orbitam o Sol. Eles são considerados restos de blocos primitivos que nunca conseguiram se fundir para formar um planeta durante o nascimento do Sistema Solar, em grande parte devido à forte interferência gravitacional do gigante Júpiter. Eles variam desde pequenas rochas até massas de centenas de quilômetros.', wiki: { 'Maior Concentração': 'Cinturão de Asteroides (entre Marte e Júpiter)', 'Maior Corpo do Cinturão': 'Ceres (atualmente classificado como Planeta Anão)', 'Composição': 'Silicatos (rocha), ferro, níquel e carbono' }, trivia: 'Embora existam milhões de asteroides no Cinturão, a massa combinada de todos eles é menor que a da nossa Lua.' },
            { id: 'meteoros', name: 'Meteoros e Meteoritos', color: 0xffaa44, desc: 'Um meteoro é o fenômeno visual conhecido popularmente como "estrela cadente". Ocorre quando um fragmento de rocha espacial (meteoroide) entra na atmosfera da Terra em altíssima velocidade. O atrito com o ar gera um calor extremo que vaporiza o objeto, gerando o rastro de luz. Se o fragmento for grande o suficiente para sobreviver à queima atmosférica e atingir o solo, ele passa a se chamar Meteorito.', wiki: { 'Velocidade de Entrada': 'Entre 11 e 72 km por segundo', 'Chuva de Meteoros': 'Ocorre quando a Terra cruza a esteira de detritos deixada por um cometa', 'Classificação Básica': 'Rochosos, metálicos e siderólitos (mistos)' }, trivia: 'Todos os dias, cerca de 100 toneladas de poeira e pequenos fragmentos espaciais entram na atmosfera da Terra.' },
            { id: 'satelites_artificiais', name: 'Satélites Artificiais', color: 0x00ffcc, desc: 'Satélites artificiais são engenhos mecânicos construídos pelo ser humano e lançados no espaço para orbitar a Terra ou outros corpos celestes. Desde o pioneiro Sputnik 1 em 1957, milhares de satélites foram enviados ao espaço, operando hoje como a espinha dorsal da nossa civilização tecnológica ao gerenciar telecomunicações globais, internet, sistemas de localização por GPS e monitoramento meteorológico.', wiki: { 'Tipos de Órbita': 'Baixa (LEO), Média (MEO) e Geoestacionária (GEO)', 'Primeiro Satélite': 'Sputnik 1 (URSS, 1957)', 'Maior Estrutura Orbital': 'Estação Espacial Internacional (ISS)' }, trivia: 'Satélites na órbita geoestacionária parecem fixos no céu porque giram exatamente na mesma velocidade de rotação da Terra.' },
            { id: 'hubble', name: 'Telescópio Espacial Hubble', color: 0x0099ff, desc: 'Lançado pela NASA em 1990, o Hubble revolucionou completamente a astrofísica moderna. Por estar posicionado acima da atmosfera terrestre, ele capturou imagens de profundidade e nitidez inéditas do universo visível sem as distorções da nossa camada de ar. O Hubble ajudou cientistas a calcularem com precisão a idade do universo e revelou a expansão acelerada do cosmos.', wiki: { 'Ano de Lançamento': '1990', 'Altitude de Órbita': 'Aproximadamente 540 km de altura', 'Espectro de Luz': 'Luz visível, ultravioleta e infravermelho próximo' }, trivia: 'O Hubble já realizou mais de 1,5 milhão de observações cósmicas ao longo de sua vida útil.' },
            { id: 'james_webb', name: 'Telescópio James Webb (JWST)', color: 0xff9900, desc: 'O Telescópio Espacial James Webb é o observatório espacial mais complexo e potente já colocado em órbita. Lançado em 2021 como o sucessor científico do Hubble, o JWST foi projetado para enxergar primordialmente no espectro infravermelho, o que o permite atravessar nuvens de poeira cósmica para fotografar as primeiras estrelas e galáxias nascidas logo após o Big Bang, além de analisar atmosferas de exoplanetas.', wiki: { 'Ano de Lançamento': '2021', 'Localização': 'Ponto de Lagrange L2 (a 1,5 milhão de km da Terra)', 'Diâmetro do Espelho': '6,5 metros (hexágonos folheados a ouro)' }, trivia: 'Para detectar a fraca luz infravermelha, o James Webb precisa operar congelado a cerca de -233 °C.' },
            { id: 'cinturao_kuiper', name: 'Cinturão de Kuiper', color: 0x557799, desc: 'O Cinturão de Kuiper é uma gigantesca região em forma de anel que se estende além da órbita de Netuno. É um reino gelado e escuro povoado por centenas de milhares de pequenos corpos congelados e fragmentos remanescentes da formação do Sistema Solar. É o lar oficial de vários planetas anões proeminentes e a zona de origem de cometas de curto período.', wiki: { 'Extensão Estimada': 'De 30 a 50 Unidades Astronômicas (UA) do Sol', 'Habitantes Célebres': 'Plutão, Eris, Haumea e Makemake', 'Primeira Visita': 'Sonda New Horizons (passou por Plutão em 2015)' }, trivia: 'Plutão foi reclassificado como planeta anão porque cientistas descobriram que ele é apenas um entre muitos objetos grandes no Cinturão de Kuiper.' }
        ];

        // ==========================================
        // FUNÇÃO INTELIGENTE DE BUSCA DE IMAGENS (PNG, JPG, JPEG)
        // ==========================================
        function loadDynamicImage(imgElement, baseName) {
            imgElement.style.display = 'block'; 
            imgElement.src = `${baseName}.png`;
            imgElement.onerror = function() {
                imgElement.src = `${baseName}.jpg`;
                imgElement.onerror = function() {
                    imgElement.src = `${baseName}.jpeg`;
                    imgElement.onerror = function() {
                        imgElement.style.display = 'none';
                        if (imgElement.parentNode) {
                            imgElement.parentNode.innerText = `[Foto ausente: ${baseName}]`;
                        }
                    };
                };
            };
        }

        // ==========================================
        // CONFIGURAÇÃO DO THREE.JS (3D)
        // ==========================================
        let scene, camera, renderer, controls;
        let planetMeshes = {};
        let orbits = [];
        let isPlaying = true;
        let speedMultiplier = 1;
        let raycaster, mouse;
        let tooltip = document.getElementById('tooltip');

        function init3D() {
            const canvas = document.getElementById('webgl-canvas');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 200, 350);

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 1000;
            controls.minDistance = 25;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
            scene.add(ambientLight);

            const sunLight = new THREE.PointLight(0xffffff, 2.5, 1000);
            scene.add(sunLight);

            celestialData.forEach(astro => {
                astro.angle = Math.random() * Math.PI * 2;

                const geometry = new THREE.SphereGeometry(astro.radius, 32, 32);
                let material;

                if (astro.id === 'sol') {
                    material = new THREE.MeshBasicMaterial({ color: astro.color });
                    const glowGeo = new THREE.SphereGeometry(astro.radius * 1.2, 32, 32);
                    const glowMat = new THREE.MeshBasicMaterial({ color: astro.color, transparent: true, opacity: 0.2 });
                    const glow = new THREE.Mesh(glowGeo, glowMat);
                    scene.add(glow);
                } else {
                    material = new THREE.MeshStandardMaterial({ color: astro.color, roughness: 0.6, metalness: 0.1 });
                }

                const mesh = new THREE.Mesh(geometry, material);
                mesh.userData = astro;
                scene.add(mesh);
                planetMeshes[astro.id] = mesh;

                if (astro.hasRings) {
                    const ringGeo = new THREE.RingGeometry(astro.radius * 1.3, astro.radius * 2.2, 64);
                    const ringMat = new THREE.MeshStandardMaterial({ color: 0xeaddb1, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2 + 0.3;
                    mesh.add(ring);
                }

                if (astro.distance > 0 && !astro.parentId) {
                    const orbitGeo = new THREE.BufferGeometry();
                    const points = [];
                    for(let i = 0; i <= 64; i++) {
                        const theta = (i / 64) * Math.PI * 2;
                        points.push(new THREE.Vector3(Math.cos(theta) * astro.distance, 0, Math.sin(theta) * astro.distance));
                    }
                    orbitGeo.setFromPoints(points);
                    const orbitMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 });
                    const orbitLine = new THREE.Line(orbitGeo, orbitMat);
                    scene.add(orbitLine);
                    orbits.push(orbitLine);
                }
            });

            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
            const starsPoints = [];
            for (let i = 0; i < 2000; i++) {
                const x = THREE.MathUtils.randFloatSpread(2000);
                const y = THREE.MathUtils.randFloatSpread(2000);
                const z = THREE.MathUtils.randFloatSpread(2000);
                starsPoints.push(x, y, z);
            }
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPoints, 3));
            const starField = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starField);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('click', onClick);
            window.addEventListener('resize', onWindowResize);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Object.values(planetMeshes));

            if (intersects.length > 0) {
                document.body.style.cursor = 'pointer';
                tooltip.style.display = 'block';
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';
                tooltip.innerText = intersects[0].object.userData.name;
            } else {
                document.body.style.cursor = 'default';
                tooltip.style.display = 'none';
            }
        }

        function onClick(event) {
            if(event.clientX > window.innerWidth - 400 && !document.getElementById('side-panel').classList.contains('hidden')) return;
            if(event.clientY > window.innerHeight - 80) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(Object.values(planetMeshes));

            if (intersects.length > 0) {
                const astro = intersects[0].object.userData;
                openSidePanel(astro);
                
                const pos = intersects[0].object.position;
                controls.target.set(pos.x, pos.y, pos.z);
                
                const offset = astro.radius * 5;
                camera.position.set(pos.x + offset, pos.y + (offset/2), pos.z + offset);
            }
        }

        function animate3D() {
            requestAnimationFrame(animate3D);

            if (isPlaying) {
                celestialData.forEach(astro => {
                    const mesh = planetMeshes[astro.id];
                    mesh.rotation.y += 0.01;

                    if (astro.speed > 0) {
                        astro.angle += astro.speed * speedMultiplier;
                        
                        let x = 0; let z = 0;
                        if (astro.parentId) {
                            const parentMesh = planetMeshes[astro.parentId];
                            x = parentMesh.position.x + Math.cos(astro.angle) * astro.distance;
                            z = parentMesh.position.z + Math.sin(astro.angle) * astro.distance;
                        } else {
                            x = Math.cos(astro.angle) * astro.distance;
                            z = Math.sin(astro.angle) * astro.distance;
                        }
                        
                        mesh.position.set(x, 0, z);
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==========================================
        // LÓGICA DA INTERFACE 2D (DOM)
        // ==========================================
        
        function createStars2D() {
            const starsContainer = document.getElementById('stars-background');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.width = `${Math.random() * 3}px`;
                star.style.height = star.style.width;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.animationDuration = `${Math.random() * 3 + 1}s`;
                starsContainer.appendChild(star);
            }
        }

        function generateWiki() {
            const grid = document.getElementById('wiki-grid');
            
            // 1. Renderiza os planetas e astros principais (Com descrição detalhada)
            celestialData.forEach(astro => {
                const card = document.createElement('div');
                card.className = 'wiki-card';
                
                let wikiHTML = `
                    <div class="wiki-color-header" style="background-color: #${astro.color.toString(16).padStart(6, '0')}"></div>
                    <div class="wiki-photo-container" id="wiki-container-${astro.id}">
                        <img id="wiki-img-${astro.id}" alt="Foto de ${astro.name}">
                    </div>
                    <div class="wiki-content">
                        <h2>${astro.name}</h2>
                        <p><strong>Descrição:</strong> ${astro.desc}</p>
                `;
                for (const [key, value] of Object.entries(astro.wiki)) {
                    wikiHTML += `<p><strong>${key}:</strong> ${value}</p>`;
                }
                wikiHTML += `<p><strong>Curiosidade:</strong> ${astro.trivia}</p></div>`;
                card.innerHTML = wikiHTML;
                grid.appendChild(card);
                
                const imgEl = document.getElementById(`wiki-img-${astro.id}`);
                loadDynamicImage(imgEl, `${astro.id}2`);
            });

            // 2. Renderiza os novos elementos extras solicitados
            extraWikiData.forEach(astro => {
                const card = document.createElement('div');
                card.className = 'wiki-card';
                
                let wikiHTML = `
                    <div class="wiki-color-header" style="background-color: #${astro.color.toString(16).padStart(6, '0')}"></div>
                    <div class="wiki-photo-container" id="wiki-container-${astro.id}">
                        <img id="wiki-img-${astro.id}" alt="Foto de ${astro.name}">
                    </div>
                    <div class="wiki-content">
                        <h2>${astro.name}</h2>
                        <p><strong>Descrição:</strong> ${astro.desc}</p>
                `;
                for (const [key, value] of Object.entries(astro.wiki)) {
                    wikiHTML += `<p><strong>${key}:</strong> ${value}</p>`;
                }
                wikiHTML += `<p><strong>Curiosidade:</strong> ${astro.trivia}</p></div>`;
                card.innerHTML = wikiHTML;
                grid.appendChild(card);
                
                const imgEl = document.getElementById(`wiki-img-${astro.id}`);
                loadDynamicImage(imgEl, `${astro.id}2`);
            });
        }

        function openSidePanel(astro) {
            const panel = document.getElementById('side-panel');
            document.getElementById('panel-title').innerText = astro.name;
            // Mantém pouca informação resumida na tela de exploração usando shortDesc
            document.getElementById('panel-desc').innerText = astro.shortDesc; 
            document.getElementById('panel-trivia').innerText = astro.trivia;
            
            const imgContainer = document.getElementById('panel-image-container');
            imgContainer.innerHTML = `<img id="panel-img-active" alt="${astro.name}">`;
            const imgEl = document.getElementById('panel-img-active');
            loadDynamicImage(imgEl, `${astro.id}1`);

            const dataGrid = document.getElementById('panel-data');
            dataGrid.innerHTML = '';
            for (const [key, value] of Object.entries(astro.wiki)) {
                dataGrid.innerHTML += `<div class="data-item"><span>${key}</span>${value}</div>`;
            }

            panel.classList.remove('hidden');
        }

        function closeSidePanel() {
            document.getElementById('side-panel').classList.add('hidden');
        }

        document.getElementById('btn-play-pause').addEventListener('click', (e) => {
            isPlaying = !isPlaying;
            e.target.innerText = isPlaying ? '⏸ Pausar' : '▶ Continuar';
        });

        function setSpeed(mult) {
            speedMultiplier = mult;
            document.querySelectorAll('.speed-controls button').forEach(btn => btn.classList.remove('active-speed'));
            if(window.event && window.event.target) window.event.target.classList.add('active-speed');
        }

        document.getElementById('btn-toggle-orbits').addEventListener('click', (e) => {
            const areVisible = orbits[0].visible;
            orbits.forEach(orbit => orbit.visible = !areVisible);
            e.target.innerText = areVisible ? 'Mostrar Órbitas' : 'Ocultar Órbitas';
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            controls.target.set(0, 0, 0);
            camera.position.set(0, 200, 350);
            closeSidePanel();
        });

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                setTimeout(() => s.classList.add('hidden'), 800);
            });
            
            const target = document.getElementById(screenId);
            target.classList.remove('hidden');
            setTimeout(() => target.classList.add('active'), 50);

            if (screenId === 'explore-screen' && !scene) {
                init3D();
                animate3D();
            }
        }

        document.getElementById('btn-explore').addEventListener('click', () => showScreen('explore-screen'));
        document.getElementById('btn-wiki').addEventListener('click', () => showScreen('wiki-screen'));

        window.onload = () => {
            createStars2D();
            generateWiki();
        };
    </script>
</body>
</html>
